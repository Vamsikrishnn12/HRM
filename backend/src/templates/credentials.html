<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your HRMS Account Credentials</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f6f8;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #333333;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background-color: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }
    .header {
      background-color: #1a73e8;
      padding: 24px 32px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      color: #ffffff;
      font-size: 22px;
      font-weight: 600;
    }
    .body {
      padding: 32px;
    }
    .body h2 {
      margin-top: 0;
      font-size: 18px;
      color: #1a73e8;
    }
    .body p {
      font-size: 14px;
      line-height: 1.6;
    }
    .credentials {
      background-color: #f0f4ff;
      border-left: 4px solid #1a73e8;
      padding: 16px 20px;
      margin: 20px 0;
      border-radius: 0 6px 6px 0;
    }
    .credentials p {
      margin: 6px 0;
      font-size: 14px;
    }
    .credentials strong {
      display: inline-block;
      min-width: 110px;
      color: #333333;
    }
    .note {
      background-color: #fff8e1;
      border: 1px solid #ffe082;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;
      color: #6d4c00;
      margin-top: 20px;
    }
    .footer {
      background-color: #f4f6f8;
      text-align: center;
      padding: 16px 32px;
      font-size: 12px;
      color: #888888;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>HRMS</h1>
    </div>
    <div class="body">
      <h2>Welcome, {{firstName}}!</h2>
      <p>Your account has been created successfully. Below are your login credentials:</p>
      <div class="credentials">
        <p><strong>Employee ID:</strong> {{empId}}</p>
        <p><strong>Email:</strong> {{email}}</p>
        <p><strong>Password:</strong> {{password}}</p>
      </div>
      <div class="note">
        ⚠️ For security, please change your password immediately after your first login.
      </div>
    </div>
    <div class="footer">
      <p>&copy; {{year}} HRMS. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
