[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "18"

# Netlify Next.js runtime — handles SSR, ISR, image optimisation, etc.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# SPA-style client-side routing fallback for any unmatched path
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Cache static assets aggressively
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
